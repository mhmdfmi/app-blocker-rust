name: App Blocker CI/CD

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Build & Test ─────────────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Periksa format kode (rustfmt)
        run: cargo fmt -- --check

      - name: Lint dengan clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Build debug
        run: cargo build --all-targets

      - name: Jalankan semua unit test
        run: cargo test --all

      - name: Build release
        run: cargo build --release

      - name: Upload artifact (release binary)
        uses: actions/upload-artifact@v4
        with:
          name: app_blocker-windows-x64
          path: target/release/app_blocker.exe
          retention-days: 30

  # ── Security Audit ───────────────────────────────────────────────────────────
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Jalankan audit keamanan
        run: cargo audit

  # ── Release ──────────────────────────────────────────────────────────────────
  release:
    name: Buat Release
    runs-on: windows-latest
    needs: [ build-and-test, security-audit ]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Build release
        run: cargo build --release

      - name: Buat arsip ZIP
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $zipName = "app_blocker-$version-windows-x64.zip"
          Compress-Archive -Path @(
            "target\release\app_blocker.exe",
            "config\",
            "scripts\",
            "README.md",
            "CHANGELOG.md",
            "LICENSE",
            ".env"
          ) -DestinationPath $zipName
          Write-Host "Dibuat: $zipName"

      - name: Buat GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.zip"
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
