name: App Blocker CI/CD

on:
  push:
    branches: [main]
    tags: ["v*"]
  release:
    types: [published]
  workflow_dispatch: {}
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

permissions:
  contents: write

jobs:
  # ── Build & Test ─────────────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Periksa format kode (rustfmt)
        run: cargo fmt -- --check

      - name: Lint dengan clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Build debug
        run: cargo build --all-targets

      - name: Jalankan semua unit test
        run: cargo test --all

      - name: Build release
        run: cargo build --release

      - name: Upload artifact (release binary)
        uses: actions/upload-artifact@v4
        with:
          name: app_blocker-windows-x64
          path: target/release/app_blocker.exe
          retention-days: 30

  # ── Security Audit ───────────────────────────────────────────────────────────
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Jalankan audit keamanan
        run: cargo audit

  # ── Release ──────────────────────────────────────────────────────────────────
  release:
    name: Buat Release
    runs-on: windows-latest
    needs: [build-and-test, security-audit]
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release' }}

    steps:
      - name: Checkout kode (full fetch)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Debug show ref (temporary)
        shell: pwsh
        run: |
          Write-Host "EVENT: $env:GITHUB_EVENT_NAME"
          Write-Host "REF: $env:GITHUB_REF"
          Write-Host "REF_NAME: $env:GITHUB_REF_NAME"
          Write-Host "ACTOR: $env:GITHUB_ACTOR"
          Write-Host "Contents of target/release (if any):"
          if (Test-Path target\release) { Get-ChildItem target\release | ForEach-Object { Write-Host $_.FullName } } else { Write-Host "target/release not found" }

      - name: Download build artifact (optional, if build-and-test uploaded it)
        uses: actions/download-artifact@v4
        with:
          name: app_blocker-windows-x64
          path: ./target/release

      - name: Buat arsip ZIP
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME
          if (-not $version) { $version = "unknown" }
          $zipName = "app_blocker-$version-windows-x64.zip"

          if (-not (Test-Path "target\release\app_blocker.exe")) {
            Write-Error "Binary release tidak ditemukan: target\release\app_blocker.exe. Membatalkan."
            exit 1
          }

          $items = @("target\release\app_blocker.exe","config\","scripts\","README.md","CHANGELOG.md","LICENSE")
          if (Test-Path ".env") { $items += ".env" }

          $existing = $items | Where-Object { Test-Path $_ }
          Write-Host "Will archive:"
          $existing | ForEach-Object { Write-Host " - $_" }

          Compress-Archive -Path $existing -DestinationPath $zipName -Force
          Write-Host "Created: $zipName"

      - name: Buat GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.zip"
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
